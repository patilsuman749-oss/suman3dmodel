<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2D Air Drawing</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
#wrap{position:relative;width:100vw;height:100vh;overflow:hidden}
video,canvas{position:absolute;inset:0;width:100%;height:100%}
video{object-fit:cover;transform:scaleX(-1)}
#controls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10}
button{padding:10px 16px;margin:4px}
</style>
</head>
<body>
<div id="wrap">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>
<div id="controls">
<button onclick="clearDrawing()">Clear</button>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let drawPoints=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const hands=new Hands({
 locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
 maxNumHands:1,
 modelComplexity:1,
 minDetectionConfidence:0.5,
 minTrackingConfidence:0.5
});

hands.onResults((results)=>{
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // draw saved path
 if(drawPoints.length>1){
   ctx.beginPath();
   ctx.strokeStyle="cyan";
   ctx.lineWidth=4;
   ctx.moveTo(drawPoints[0].x,drawPoints[0].y);
   for(let p of drawPoints) ctx.lineTo(p.x,p.y);
   ctx.stroke();
 }

 if(results.multiHandLandmarks){
   for(const landmarks of results.multiHandLandmarks){

     drawConnectors(ctx, landmarks, HAND_CONNECTIONS,{color:"#00ff00"});
     drawLandmarks(ctx, landmarks,{color:"#ff0000"});

     const tip=landmarks[8];
     const x=(1-tip.x)*canvas.width;
     const y=tip.y*canvas.height;

     drawPoints.push({x,y});
     if(drawPoints.length>3000) drawPoints.shift();

     ctx.beginPath();
     ctx.arc(x,y,10,0,Math.PI*2);
     ctx.fillStyle="yellow";
     ctx.fill();
   }
 }
});

function clearDrawing(){
 drawPoints=[];
}

const camera=new Camera(video,{
 onFrame:async()=>{
   await hands.send({image:video});
 },
 width:640,
 height:480
});

camera.start();
</script>
</body>
</html>
