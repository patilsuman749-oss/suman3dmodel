<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Air Draw 3D V2</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
header{padding:12px;text-align:center;font-weight:bold}
#wrap{display:flex;flex-wrap:wrap;height:calc(100vh - 60px)}
#left,#right{flex:1;min-width:320px;position:relative}
video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#right{background:#000}
.controls{padding:10px;text-align:center}
button{padding:10px 15px;margin:4px}
</style>
</head>
<body>
<header>Air Draw 3D V2</header>
<div id="wrap">
<div id="left">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>
<div id="right">
<canvas id="draw"></canvas>
</div>
</div>
<div class="controls">
<button onclick="startCam()">Start Camera</button>
<button onclick="stopCam()">Stop Camera</button>
<button onclick="clearDraw()">Clear Drawing</button>
</div>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const draw=document.getElementById('draw');
const dctx=draw.getContext('2d');
let stream;

function resize(){
canvas.width=video.clientWidth||640;
canvas.height=video.clientHeight||480;
draw.width=draw.clientWidth||640;
draw.height=draw.clientHeight||480;
}
window.onresize=resize;

async function startCam(){
try{
stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
resize();
}catch(e){alert("Camera error: "+e.message);}
}
function stopCam(){
if(stream) stream.getTracks().forEach(t=>t.stop());
}
function clearDraw(){
dctx.clearRect(0,0,draw.width,draw.height);
}

canvas.addEventListener('mousemove',e=>{
if(e.buttons){
dctx.lineWidth=3;
dctx.lineTo(e.offsetX,e.offsetY);
dctx.strokeStyle='cyan';
dctx.stroke();
}
});

startCam();
</script>
</body>
</html>
