<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Air Draw 3D V4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"></script>

<style>
body{margin:0;background:#050b12;color:white;font-family:Arial}
.wrap{display:flex;height:100vh}
.left,.right{flex:1;position:relative}
video,canvas{position:absolute;inset:0;width:100%;height:100%}
video{object-fit:cover;transform:scaleX(-1)}
#three{width:100%;height:100%}
.controls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10}
button{padding:10px 16px;margin:4px;border:none;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
<div class="left">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>
<div class="right">
<div id="three"></div>
</div>
</div>

<div class="controls">
<button onclick="clearDrawing()">Clear</button>
<button onclick="saveModel()">Save Model</button>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let drawPoints=[];

const holder=document.getElementById("three");
const scene=new THREE.Scene();
const camera3d=new THREE.PerspectiveCamera(60,1,0.1,2000);
camera3d.position.z=250;

const renderer=new THREE.WebGLRenderer({antialias:true});
holder.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1.5));

let line=null;

function resize(){
 canvas.width=canvas.clientWidth;
 canvas.height=canvas.clientHeight;
 renderer.setSize(holder.clientWidth,holder.clientHeight);
 camera3d.aspect=holder.clientWidth/holder.clientHeight;
 camera3d.updateProjectionMatrix();
}
window.addEventListener("resize",resize);

function update3D(){
 if(drawPoints.length<2) return;

 if(line) scene.remove(line);

 const pts=[];
 for(let i=0;i<drawPoints.length;i++){
   const p=drawPoints[i];
   pts.push(new THREE.Vector3(
      (p.x-canvas.width/2)*0.6,
      -(p.y-canvas.height/2)*0.6,
      Math.sin(i*0.15)*80
   ));
 }

 const geo=new THREE.BufferGeometry().setFromPoints(pts);
 const mat=new THREE.LineBasicMaterial({color:0x00ffff});
 line=new THREE.Line(geo,mat);
 scene.add(line);
}

function animate(){
 requestAnimationFrame(animate);
 update3D();
 if(line){
   line.rotation.y += 0.01;
   line.rotation.x += 0.004;
 }
 renderer.render(scene,camera3d);
}
animate();

resize();

const hands=new Hands({
 locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
 maxNumHands:1,
 modelComplexity:1,
 minDetectionConfidence:0.5,
 minTrackingConfidence:0.5
});

hands.onResults((results)=>{
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(drawPoints.length>1){
   ctx.beginPath();
   ctx.strokeStyle="cyan";
   ctx.lineWidth=4;
   ctx.moveTo(drawPoints[0].x,drawPoints[0].y);
   for(const p of drawPoints) ctx.lineTo(p.x,p.y);
   ctx.stroke();
 }

 if(results.multiHandLandmarks){
   for(const landmarks of results.multiHandLandmarks){
     drawConnectors(ctx,landmarks,HAND_CONNECTIONS,{color:"#00ff66"});
     drawLandmarks(ctx,landmarks,{color:"#ff3333"});

     const tip=landmarks[8];
     const x=(1-tip.x)*canvas.width;
     const y=tip.y*canvas.height;

     drawPoints.push({x,y});
     if(drawPoints.length>4000) drawPoints.shift();

     ctx.beginPath();
     ctx.arc(x,y,10,0,Math.PI*2);
     ctx.fillStyle="yellow";
     ctx.fill();
   }
 }
});

function clearDrawing(){
 drawPoints=[];
 if(line){scene.remove(line); line=null;}
}

function saveModel(){
 const blob=new Blob([JSON.stringify(drawPoints)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='airdraw3d.json';
 a.click();
}

const camera=new Camera(video,{
 onFrame:async()=>{ await hands.send({image:video}); },
 width:640,height:480
});

camera.start();
</script>
</body>
</html>
