<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Air Draw 3D V3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
header{padding:10px;text-align:center;font-weight:bold}
.wrap{display:flex;height:calc(100vh - 60px)}
.left,.right{flex:1;position:relative}
video{width:100%;height:100%;object-fit:cover}
#three{width:100%;height:100%}
.controls{padding:10px;text-align:center}
button{padding:10px 15px;margin:4px}
</style>
</head>
<body>
<header>Air Draw 3D V3</header>
<div class="wrap">
<div class="left">
<video id="video" autoplay playsinline></video>
</div>
<div class="right">
<div id="three"></div>
</div>
</div>
<div class="controls">
<button onclick="startCam()">Start Camera</button>
<button onclick="stopCam()">Stop Camera</button>
<button onclick="clearModel()">Clear Model</button>
</div>

<script>
let stream;
const video=document.getElementById('video');

async function startCam(){
 try{
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
 }catch(e){alert(e.message);}
}
function stopCam(){
 if(stream) stream.getTracks().forEach(t=>t.stop());
}

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
camera.position.z=5;
const renderer=new THREE.WebGLRenderer();
const holder=document.getElementById('three');
renderer.setSize(holder.clientWidth||500,holder.clientHeight||500);
holder.appendChild(renderer.domElement);

const points=[];
for(let i=0;i<200;i++){
 points.push(new THREE.Vector3(
   Math.sin(i*0.1),
   Math.cos(i*0.1),
   i*0.01
 ));
}
const geometry=new THREE.BufferGeometry().setFromPoints(points);
let line=new THREE.Line(geometry,new THREE.LineBasicMaterial({color:0x00ffff}));
scene.add(line);

function clearModel(){
 scene.remove(line);
}

function animate(){
 requestAnimationFrame(animate);
 if(line) line.rotation.y+=0.01;
 renderer.render(scene,camera);
}
animate();
startCam();
</script>
</body>
</html>
